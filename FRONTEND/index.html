<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake News Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
    /* Reset & base */
    * {
        box-sizing: border-box;
    }
    body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: #fff;
        overflow: hidden;
    }

    h1 {
        font-size: 3rem;
        color: #00ffe1;
        text-shadow: 2px 2px 10px #000;
        margin-bottom: 30px;
    }

    /* Glass effect textarea */
    textarea {
        width: 450px;
        height: 140px;
        padding: 20px;
        border-radius: 20px;
        border: none;
        font-size: 16px;
        outline: none;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        color: #fff;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        transition: 0.3s ease;
    }
    textarea::placeholder {
        color: #aaa;
    }
    textarea:focus {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 20px #00ffe1;
        transform: scale(1.02);
    }

    /* Glassy neon button */
    button {
        margin-top: 20px;
        padding: 14px 30px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 15px;
        border: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        color: #00ffe1;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 30px rgba(0, 255, 225, 0.5);
        transition: 0.3s ease;
    }
    button:hover {
        background: rgba(0, 255, 225, 0.15);
        color: #fff;
        transform: scale(1.05);
        box-shadow: 0 0 20px #00ffe1, 0 0 40px #00ffe1;
    }

    /* Prediction box */
    #result {
        margin-top: 25px;
        font-size: 1.8rem;
        font-weight: bold;
        padding: 15px 25px;
        border-radius: 15px;
        min-width: 250px;
        text-align: center;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* REAL / FAKE colors */
    .REAL {
        background: linear-gradient(135deg, #00ff99, #28a745);
        color: #fff;
        box-shadow: 0 0 20px #28a745;
    }

    .FAKE {
        background: linear-gradient(135deg, #ff4d4d, #dc3545);
        color: #fff;
        box-shadow: 0 0 20px #dc3545;
    }

    /* Fun floating bubbles animation */
    .bubble {
        position: absolute;
        border-radius: 50%;
        background: rgba(0, 255, 225, 0.2);
        animation: float 15s infinite;
        pointer-events: none;
        z-index: 0;
    }

    @keyframes float {
        0% { transform: translateY(100vh) scale(0.5); opacity: 0.5; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
</style>
</head>
<body>
<h1>Fake News Detector</h1>
<textarea id="newsText" placeholder="Paste or type news here..."></textarea>
<button onclick="predictNews()">Check News</button>
<div id="result"></div>

<!-- Floating bubbles -->
<script>
    for (let i = 0; i < 15; i++) {
        let bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.style.width = bubble.style.height = Math.random() * 50 + 20 + 'px';
        bubble.style.left = Math.random() * 100 + 'vw';
        bubble.style.animationDuration = Math.random() * 10 + 10 + 's';
        document.body.appendChild(bubble);
    }
</script>

<script>
async function predictNews() {
    const text = document.getElementById("newsText").value;
    const resultDiv = document.getElementById("result");

    if (!text) {
        resultDiv.innerText = "Please type some news!";
        resultDiv.className = "";
        return;
    }

    try {
        const response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();
        resultDiv.innerText = "Prediction: " + data.prediction;
        resultDiv.className = data.prediction; // REAL = green, FAKE = red
    } catch (err) {
        resultDiv.innerText = "Error connecting to API!";
        resultDiv.className = "";
        console.error(err);
    }
}
</script>
</body>
</html>
